<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <title>Mob Timer — Focus Timer for macOS</title>
    <meta name="description"
      content="A minimal macOS timer designed for deep focus and mob programming. Start instantly, stay focused, get notified.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
      rel="stylesheet">
  </head>
  <body>
    <style>
      #klar-cryptix-hero-section.klar-cryptix-hero-section {
        position: relative;
        overflow: hidden;
        padding: 110px 0 0;
        background:
          linear-gradient(180deg, #07070d 0%, #090b10 62%, #0a0d11 100%);
        color: #f5f7fa;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-radial {
        position: absolute;
        left: 50%;
        bottom: 180px;
        transform: translateX(-50%);
        width: 1300px;
        height: 620px;
        border-radius: 50%;
        background:
          radial-gradient(ellipse at center,
            rgba(24, 212, 147, 0.28) 0%,
            rgba(10, 88, 62, 0.16) 28%,
            rgba(4, 26, 20, 0.08) 52%,
            rgba(0, 0, 0, 0) 76%);
        filter: blur(18px);
        opacity: 0.95;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-beam {
        position: absolute;
        left: 50%;
        bottom: 268px;
        transform: translateX(-50%);
        width: min(92vw, 1080px);
        height: 2px;
        background: linear-gradient(90deg,
            rgba(255, 255, 255, 0) 0%,
            rgba(229, 255, 245, 0.24) 14%,
            rgba(240, 255, 249, 0.95) 50%,
            rgba(229, 255, 245, 0.24) 86%,
            rgba(255, 255, 255, 0) 100%);
        box-shadow:
          0 0 16px rgba(194, 255, 231, 0.45),
          0 0 44px rgba(94, 255, 188, 0.22);
        opacity: 0.92;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-inner {
        position: relative;
        z-index: 2;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-copy {
        max-width: 820px;
        margin: 0 auto;
        text-align: center;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-title {
        margin: 0;
        font-size: clamp(3rem, 6.4vw, 5.7rem);
        line-height: 0.98;
        letter-spacing: -0.065em;
        font-weight: 400;
        color: #f6f7f8;
        text-wrap: balance;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-description {
        margin: 22px auto 0;
        max-width: 760px;
        font-size: 18px;
        line-height: 1.45;
        letter-spacing: -0.015em;
        color: rgba(244, 246, 248, 0.62);
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 30px;
        min-height: 54px;
        padding: 0 28px;
        border-radius: 999px;
        background: linear-gradient(180deg, #4dffba 0%, #42f3ae 100%);
        color: #03140e;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: -0.03em;
        text-decoration: none;
        box-shadow:
          0 0 0 1px rgba(120, 255, 203, 0.08),
          0 10px 24px rgba(41, 255, 167, 0.18),
          0 0 34px rgba(41, 255, 167, 0.14);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-cta:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
        box-shadow:
          0 0 0 1px rgba(120, 255, 203, 0.1),
          0 14px 30px rgba(41, 255, 167, 0.22),
          0 0 40px rgba(41, 255, 167, 0.16);
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-trust {
        margin-top: 42px;
        text-align: center;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-trust-label {
        margin: 0 0 8px;
        font-size: 16px;
        color: rgba(244, 246, 248, 0.66);
        letter-spacing: -0.02em;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-rating {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        color: #f4f6f8;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-stars {
        font-size: 14px;
        letter-spacing: 0.06em;
        color: #ffffff;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-score {
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-google {
        font-size: 16px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-visual-wrap {
        position: relative;
        z-index: 2;
        margin-top: 92px;
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-screen {
        position: relative;
        width: min(1180px, calc(100vw - 48px));
        margin: 0 auto;
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        overflow: hidden;
        box-shadow:
          0 -1px 0 rgba(255, 255, 255, 0.18),
          0 -18px 50px rgba(16, 255, 164, 0.08);
      }

      #klar-cryptix-hero-section .klar-cryptix-hero-image {
        display: block;
        width: 100%;
        height: auto;
        object-fit: cover;
        object-position: center top;
      }

      @media (max-width: 900px) {
        #klar-cryptix-hero-section.klar-cryptix-hero-section {
          padding-top: 92px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-description {
          font-size: 16px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-visual-wrap {
          margin-top: 72px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-radial {
          width: 980px;
          height: 500px;
          bottom: 130px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-beam {
          bottom: 198px;
        }
      }

      @media (max-width: 640px) {
        #klar-cryptix-hero-section.klar-cryptix-hero-section {
          padding-top: 82px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-title {
          font-size: clamp(2.5rem, 12vw, 4rem);
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-description {
          max-width: 92%;
          line-height: 1.6;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-description br {
          display: none;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-cta {
          width: auto;
          font-size: 17px;
          min-height: 52px;
          padding: 0 24px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-trust {
          margin-top: 32px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-visual-wrap {
          margin-top: 56px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-screen {
          width: calc(100vw - 24px);
          border-top-left-radius: 14px;
          border-top-right-radius: 14px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-radial {
          width: 760px;
          height: 420px;
          bottom: 80px;
        }

        #klar-cryptix-hero-section .klar-cryptix-hero-beam {
          bottom: 132px;
          width: calc(100vw - 24px);
        }
      }
    </style>
    <section id="klar-cryptix-hero-section" class="klar-cryptix-hero-section">
      <div class="klar-cryptix-hero-bg">
        <div class="klar-cryptix-hero-radial"></div>
        <div class="klar-cryptix-hero-beam"></div>
      </div>

      <div class="container">
        <div class="klar-cryptix-hero-inner">
          <div class="klar-cryptix-hero-copy">
            <h1 class="klar-cryptix-hero-title">
              Take Control of<br>
              Your Digital Assets
            </h1>

            <p class="klar-cryptix-hero-description">
              Cryptix offers a secure experience for managing your digital<br>
              assets. Instant transactions, optimized fees, and premium design.
            </p>

            <a href="#download" class="klar-cryptix-hero-cta">Get started now</a>

            <div class="klar-cryptix-hero-trust">
              <p class="klar-cryptix-hero-trust-label">They trust us</p>
              <div class="klar-cryptix-hero-rating">
                <span class="klar-cryptix-hero-stars">★ ★ ★ ★ ★</span>
                <span class="klar-cryptix-hero-score">4,9</span>
                <span class="klar-cryptix-hero-google">G</span>
              </div>
            </div>
          </div>

          <div class="klar-cryptix-hero-visual-wrap">
            <div class="klar-cryptix-hero-screen">
              <img
                src="https://framerusercontent.com/images/6AfF1TCZ0fgDvIyRPSrmwJXP9Hc.png?scale-down-to=2048&width=2880&height=1770"
                alt="Cryptix dashboard preview" class="klar-cryptix-hero-image">
            </div>
          </div>
        </div>
      </div>
    </section>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const heroSection = document.querySelector("#klar-cryptix-hero-section");
        if (!heroSection) return;

        const heroScreen = heroSection.querySelector(".klar-cryptix-hero-screen");
        const heroRadial = heroSection.querySelector(".klar-cryptix-hero-radial");

        heroSection.addEventListener("mousemove", function(event) {
          if (window.innerWidth < 992 || !heroScreen || !heroRadial) return;

          const rect = heroSection.getBoundingClientRect();
          const x = (event.clientX - rect.left) / rect.width - 0.5;
          const y = (event.clientY - rect.top) / rect.height - 0.5;

          heroScreen.style.transform = `translate3d(${x * 10}px, ${y * 6}px, 0)`;
          heroRadial.style.transform = `translateX(calc(-50% + ${x * 18}px)) translateY(${y * 10}px)`;
        });

        heroSection.addEventListener("mouseleave", function() {
          if (heroScreen) heroScreen.style.transform = "";
          if (heroRadial) heroRadial.style.transform = "translateX(-50%)";
        });
      });
    </script>

    <!-- ========== FOOTER ========== -->
    <footer class="footer">
      <div class="container">
        <div class="footer-inner">
          <div class="footer-brand">
            <img src="logo.png" alt="Mob Timer" width="24" height="24" style="border-radius: 6px; flex-shrink: 0">
            <span class="footer-name">Mob Timer</span>
          </div>
          <p class="footer-copy">
            © 2026 Mob Timer. Built with ♥ for focused teams.
          </p>
          <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">GitHub</a>
            <a href="#">Support</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="main.js"></script>

  </body>
</html>
